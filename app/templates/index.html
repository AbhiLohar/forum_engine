<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>NeuralForum | Semantic Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .search-input { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.2) !important; border-radius: 15px; }
        .result-card { border-left: 4px solid #3b82f6; margin-bottom: 1.5rem; transition: 0.2s; }
        .result-card:hover { background: rgba(255,255,255,0.05); }
        .stat-value { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row align-items-center mb-5">
            <div class="col-md-7">
                <h1 class="display-5 fw-bold">Neural<span class="text-primary">Forum</span></h1>
                <p class="text-muted">Semantic Analysis & Fuzzy Clustering Engine</p>
            </div>
            <div class="col-md-5">
                <div class="glass-panel p-3 text-center">
                    <div class="row">
                        <div class="col-6 border-end border-secondary">
                            <small class="d-block text-uppercase text-muted">Cache Hit Rate</small>
                            <span id="hit-rate" class="stat-value h4">0%</span>
                        </div>
                        <div class="col-6">
                            <small class="d-block text-uppercase text-muted">Total Queries</small>
                            <span id="total-queries" class="stat-value h4">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel p-4 mb-5">
            <div class="input-group input-group-lg">
                <input type="text" id="userInput" 
       class="form-control search-input" 
       placeholder="Type a concept..."
       onkeypress="if(event.key === 'Enter') search()">
                <button class="btn btn-primary px-5" onclick="search()">Execute Analysis</button>
            </div>
        </div>

        <div id="resultsArea"></div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('userInput').value;
            const res = await fetch('/query', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: query})
            });
            const data = await res.json();
            
            // Update Stats UI
            const statsRes = await fetch('/cache/stats');
            const statsData = await statsRes.json();
            document.getElementById('hit-rate').innerText = statsData.hit_rate;
            document.getElementById('total-queries').innerText = statsData.hit_count + statsData.miss_count;

            // Render Results
            const area = document.getElementById('resultsArea');
            const sourceColor = data.source === 'semantic_cache' ? 'text-success' : 'text-warning';
            let html = `<h5 class="mb-4">Results via <span class="${sourceColor}">${data.source.replace('_', ' ')}</span></h5>`;
            
            data.results.forEach(item => {
                html += `
                <div class="glass-panel p-4 result-card">
                    <p class="mb-2">${item.content.substring(0, 450)}...</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-primary">Cluster ID: ${data.dominant_cluster}</span>
                        <small class="text-muted">Fuzzy GMM Active</small>
                    </div>
                </div>`;
            });
            area.innerHTML = html;
        }
    </script>
</body>
</html>
